<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarRentLV - Jármű Bérlés</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#0b1118;
    color:white;
    overflow-x:hidden;
}

/* TOPBAR */
.topbar{
    width:100%;
    height:85px;
    background:linear-gradient(90deg,#07151d,#0d4f52,#07151d);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 40px;
}

.logo{
    font-size:28px;
    font-weight:700;
    color:#00d9ff;
}

.topbar h1{
    font-size:30px;
}

/* INFO */
.info-box{
    width:90%;
    margin:30px auto;
    background:rgba(255,255,255,0.04);
    padding:25px;
    border-radius:20px;
}

.info-box h2{
    color:#00d9ff;
}

/* VEHICLES */
.vehicle-grid{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:30px;
}

.vehicle-card{
    background:rgba(255,255,255,0.04);
    padding:25px;
    border-radius:25px;
}

.vehicle-card img{
    width:100%;
    height:220px;
    object-fit:contain;
}

.price-list p{
    display:flex;
    justify-content:space-between;
    background:#141d27;
    padding:10px;
    margin-top:8px;
    border-radius:10px;
}

/* FORM */
.modern-form{
    width:500px;
    margin:60px auto;
    background:rgba(255,255,255,0.05);
    padding:35px;
    border-radius:25px;
}

.input-box{
    margin-bottom:15px;
}

input, select{
    width:100%;
    padding:12px;
    background:#141d27;
    border:none;
    color:white;
}

.submit-btn{
    width:100%;
    padding:16px;
    background:linear-gradient(90deg,#00d9ff,#00a8ff);
    border:none;
    font-weight:bold;
    cursor:pointer;
}

</style>
</head>

<body>

<div class="topbar">
    <div class="logo">CarRentLV</div>
    <h1>Jármű Bérlés</h1>
</div>

<div class="info-box">
    <h2>Fontos Információk</h2>
    <p>A jármű bérlés előre fizetéssel történik.</p>
    <p>A járművet sérülésmentesen kell visszahozni.</p>
</div>

<div class="vehicle-grid">

    <div class="vehicle-card">
        <h3>Maverick</h3>
        <img src="heli.png">
        <div class="price-list">
            <p><span>1 Nap</span><span>45.000$</span></p>
            <p><span>1 Hét</span><span>250.000$</span></p>
        </div>
    </div>

    <div class="vehicle-card">
        <h3>Crod C150</h3>
        <img src="crod.png">
        <div class="price-list">
            <p><span>1 Nap</span><span>20.000$</span></p>
            <p><span>1 Hét</span><span>120.000$</span></p>
        </div>
    </div>

</div>

<div class="modern-form">

<h2>Jármű Bérlés</h2>

<div class="input-box">
<input placeholder="Ingame név">
</div>

<div class="input-box">
<input placeholder="Discord">
</div>

<div class="input-box">
<input placeholder="Telefon">
</div>

<div class="input-box">
<select>
<option>Maverick</option>
<option>Crod C150</option>
<option>Crod C550</option>
</select>
</div>

<div class="input-box">
<select>
<option>1 Nap</option>
<option>1 Hét</option>
<option>2 Hét</option>
<option>1 Hónap</option>
</select>
</div>

<button class="submit-btn" onclick="submitRental()">
Bérlés Leadása
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "IDE JÖN",
  authDomain: "IDE JÖN",
  projectId: "IDE JÖN",
  storageBucket: "IDE JÖN",
  messagingSenderId: "IDE JÖN",
  appId: "IDE JÖN"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.submitRental = async function(){

  const inputs = document.querySelectorAll("input");
  const selects = document.querySelectorAll("select");

  await addDoc(collection(db, "rentals"), {
    ingameName: inputs[0].value,
    discord: inputs[1].value,
    phone: inputs[2].value,
    vehicle: selects[0].value,
    time: selects[1].value,
    createdAt: new Date()
  });

  alert("Sikeres bérlés!");

  inputs.forEach(i => i.value = "");
  selects.forEach(s => s.selectedIndex = 0);
}

</script>

</body>
</html>
