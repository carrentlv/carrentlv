<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CarRentLV - Jármű Bérlés</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

<style>
body{
    margin:0;
    font-family:Poppins;
    background:#0b1118;
    color:white;
}

.topbar{
    padding:20px;
    background:#141d27;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.modern-form{
    width:400px;
    margin:40px auto;
    padding:20px;
    background:#141d27;
    border-radius:15px;
}

.input-box{
    margin-bottom:10px;
}

input, select{
    width:100%;
    padding:10px;
    border:none;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#00d9ff;
    border:none;
    cursor:pointer;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="topbar">
    CarRentLV - Jármű Bérlés
</div>

<div class="modern-form">

<h2>Bérlés űrlap</h2>

<div class="input-box">
<input placeholder="Ingame név">
</div>

<div class="input-box">
<input placeholder="Discord név">
</div>

<div class="input-box">
<input placeholder="Telefonszám">
</div>

<div class="input-box">
<select>
<option>Maverick</option>
<option>Crod C150</option>
<option>Crod C550</option>
</select>
</div>

<div class="input-box">
<select>
<option>1 Nap</option>
<option>1 Hét</option>
<option>2 Hét</option>
<option>1 Hónap</option>
</select>
</div>

<button onclick="submitRental()">Bérlés Leadása</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "IDE JÖN",
  authDomain: "IDE JÖN",
  projectId: "IDE JÖN",
  storageBucket: "IDE JÖN",
  messagingSenderId: "IDE JÖN",
  appId: "IDE JÖN"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.submitRental = async function(){

  const inputs = document.querySelectorAll("input");
  const selects = document.querySelectorAll("select");

  await addDoc(collection(db, "rentals"), {
    ingameName: inputs[0].value,
    discord: inputs[1].value,
    phone: inputs[2].value,
    vehicle: selects[0].value,
    time: selects[1].value,
    createdAt: new Date()
  });

  alert("Sikeres bérlés!");

  inputs.forEach(i => i.value = "");
  selects.forEach(s => s.selectedIndex = 0);
}

</script>

</body>
</html>
